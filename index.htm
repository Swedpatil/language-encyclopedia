<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Encyclopedia — Every Language in One Place</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FDF8F4;
  --bg2: #F5EDE4;
  --card: #FFFFFF;
  --primary: #C0713A;
  --primary-light: #E8A87C;
  --primary-dark: #8B4513;
  --text: #3D2B1F;
  --text-light: #7A6555;
  --accent: #D4A574;
  --highlight: #FFF3CD;
  --green: #6B8E5A;
  --border: #E8D5C4;
  --shadow: rgba(139, 69, 19, 0.08);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

header {
  background: linear-gradient(135deg, #8B4513 0%, #C0713A 50%, #D4A574 100%);
  padding: 60px 24px;
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.5;
}

header h1 {
  font-family: 'Merriweather', serif;
  font-size: 2.8em;
  font-weight: 700;
  margin-bottom: 12px;
  position: relative;
  letter-spacing: -0.5px;
}

header p {
  font-size: 1.15em;
  opacity: 0.92;
  position: relative;
  font-weight: 300;
}

.search-bar {
  max-width: 560px;
  margin: 30px auto 0;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 16px 24px 16px 50px;
  border: none;
  border-radius: 16px;
  font-size: 1.05em;
  font-family: 'Inter', sans-serif;
  background: rgba(255,255,255,0.95);
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  outline: none;
  transition: all 0.3s;
}

.search-bar input:focus {
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  transform: translateY(-1px);
}

.search-bar input::placeholder { color: #aaa; }

.search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2em;
  color: var(--text-light);
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 28px;
  position: relative;
}

.stat-item {
  text-align: center;
  color: white;
}

.stat-item .num {
  font-size: 1.8em;
  font-weight: 700;
  display: block;
}

.stat-item .lbl {
  font-size: 0.85em;
  opacity: 0.85;
  font-weight: 300;
}

.categories {
  padding: 40px 0 20px;
}

.categories h2 {
  font-family: 'Merriweather', serif;
  font-size: 1.5em;
  color: var(--text);
  margin-bottom: 20px;
  text-align: center;
}

.cat-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.cat-btn {
  padding: 10px 22px;
  border: 2px solid var(--border);
  border-radius: 30px;
  background: var(--card);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.92em;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s;
}

.cat-btn:hover, .cat-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: translateY(-1px);
}

.lang-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 30px 0 60px;
}

.lang-card {
  background: var(--card);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.lang-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px var(--shadow);
  border-color: var(--primary-light);
}

.lang-card .icon {
  font-size: 2.2em;
  margin-bottom: 12px;
  display: block;
}

.lang-card h3 {
  font-family: 'Merriweather', serif;
  font-size: 1.2em;
  color: var(--primary-dark);
  margin-bottom: 6px;
}

.lang-card .year {
  font-size: 0.82em;
  color: var(--text-light);
  margin-bottom: 8px;
}

.lang-card .desc {
  font-size: 0.92em;
  color: var(--text-light);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.lang-card .tags {
  margin-top: 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.lang-card .tag {
  padding: 3px 10px;
  background: var(--bg2);
  border-radius: 12px;
  font-size: 0.75em;
  color: var(--text-light);
  font-weight: 500;
}

.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-light);
  font-size: 1.1em;
}

.no-results .big { font-size: 3em; margin-bottom: 12px; display: block; }

/* DETAIL VIEW */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(61, 43, 31, 0.5);
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.detail-overlay.show { display: flex; justify-content: center; align-items: flex-start; }

.detail-panel {
  background: var(--bg);
  max-width: 800px;
  width: 100%;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.35s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.detail-header {
  padding: 40px;
  color: white;
  position: relative;
}

.detail-header .back-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 1.2em;
  cursor: pointer;
  transition: background 0.2s;
}

.detail-header .back-btn:hover { background: rgba(255,255,255,0.35); }

.detail-header .big-icon { font-size: 3em; margin-bottom: 12px; display: block; }
.detail-header h1 { font-family: 'Merriweather', serif; font-size: 2em; margin-bottom: 4px; }
.detail-header .subtitle { opacity: 0.9; font-weight: 300; }

.detail-body { padding: 36px 40px 48px; }

.detail-section {
  margin-bottom: 32px;
}

.detail-section h2 {
  font-family: 'Merriweather', serif;
  font-size: 1.2em;
  color: var(--primary-dark);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail-section p, .detail-section li {
  font-size: 1em;
  line-height: 1.8;
  color: var(--text);
}

.detail-section ul {
  padding-left: 20px;
}

.detail-section li {
  margin-bottom: 6px;
}

.highlight-box {
  background: var(--highlight);
  border-left: 4px solid var(--primary);
  padding: 16px 20px;
  border-radius: 0 12px 12px 0;
  margin: 16px 0;
  font-size: 0.95em;
}

.highlight-box strong { color: var(--primary-dark); }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 10px;
}

.info-item {
  background: var(--card);
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.info-item .label {
  font-size: 0.78em;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 4px;
}

.info-item .value {
  font-size: 1em;
  color: var(--text);
  font-weight: 500;
}

.code-example {
  background: #2D1B0E;
  color: #F5DEB3;
  padding: 18px 22px;
  border-radius: 12px;
  font-family: 'Courier New', monospace;
  font-size: 0.9em;
  line-height: 1.6;
  overflow-x: auto;
  margin-top: 10px;
  white-space: pre;
}

footer {
  text-align: center;
  padding: 40px 24px;
  color: var(--text-light);
  font-size: 0.9em;
  border-top: 1px solid var(--border);
}

@media (max-width: 640px) {
  header h1 { font-size: 1.8em; }
  header { padding: 40px 16px; }
  .stats-bar { gap: 20px; }
  .stat-item .num { font-size: 1.3em; }
  .detail-body { padding: 24px 20px 36px; }
  .detail-header { padding: 28px 20px; }
  .info-grid { grid-template-columns: 1fr; }
  .lang-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Language Encyclopedia</h1>
  <p>Every programming language in one place — Learn, explore, discover</p>
  <div class="search-bar">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search any language... (e.g. Python, Java, C++)" autocomplete="off">
  </div>
  <div class="stats-bar">
    <div class="stat-item"><span class="num" id="totalCount">0</span><span class="lbl">Languages</span></div>
    <div class="stat-item"><span class="num" id="catCount">0</span><span class="lbl">Categories</span></div>
    <div class="stat-item"><span class="num" id="yearRange">-</span><span class="lbl">Years Covered</span></div>
  </div>
</header>

<div class="container">
  <div class="categories">
    <h2>Browse by Category</h2>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <div class="lang-grid" id="langGrid"></div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<footer>
  Language Encyclopedia &mdash; Built for curious minds. Works completely offline.
</footer>

    realLife: "Tkinter (Python's GUI library) is built on Tcl/Tk. EDA tools from Cadence and Synopsys use Tcl for scripting. Expect (automation tool) uses Tcl.",
    paradigm: "Multi-paradigm: Event-driven, Imperative, Object-Oriented",
    typing: "Dynamic, Untyped",
    compilation: "Interpreted",
    helloWorld: 'puts "Hello, World!"',
    keyFeatures: ["Everything is a string", "Tk GUI toolkit", "Event-driven I/O", "Safe interpreter for untrusted code", "Easy C integration", "Cross-platform GUI"],
    famousFor: "Tk toolkit changed GUI programming. Every Python Tkinter app uses Tcl under the hood."
  },
  {
    name: "Forth", icon: "\u2693", year: 1970, creator: "Charles H. Moore",
    category: "Stack-Based", difficulty: "Advanced",
    purpose: "Forth is a stack-based, interactive language designed for embedded systems and real-time applications. It uses Reverse Polish Notation (RPN) and extensible dictionary.",
    why: "Charles Moore created Forth to control telescopes at the National Radio Astronomy Observatory. Its minimal footprint and interactive nature made it perfect for embedded control.",
    uses: ["Embedded Systems", "Space Applications", "NASA Spacecraft", "Real-Time Control", "Bootloaders", "FPGA prototyping"],
    realLife: "NASA's Philae lander on comet 67P used Forth (via Chuck Moore's colorForth). Many spacecraft use Forth for instrument control. The Ace32 bootloader uses Forth.",
    paradigm: "Stack-Based, Concatenative, Interactive",
    typing: "Stack-based (untyped at runtime)",
    compilation: "Compiled (threaded code)",
    helloWorld: '.( Hello, World!)',
    keyFeatures: ["Stack-based computation", "RPN (no operator precedence)", "Extensible vocabulary", "Interactive development", "Tiny footprint (<10KB)", "Direct hardware access"],
    famousFor: "Controlled spacecraft to a comet. The most minimal and direct programming language."
  }
];

const CATEGORIES = [...new Set(LANGUAGES.map(l => l.category))];

function getDifficultyColor(d) {
  const colors = { "Beginner-Friendly": "#6B8E5A", "Intermediate": "#C0713A", "Advanced": "#8B4513", "Expert": "#5C2D0E" };
  return colors[d] || "#999";
}

function renderCards(langs) {
  const grid = document.getElementById('langGrid');
  if (langs.length === 0) {
    grid.innerHTML = '<div class="no-results"><span class="big">\uD83D\uDD0D</span>No languages found. Try a different search.</div>';
    return;
  }
  grid.innerHTML = langs.map(l => `
    <div class="lang-card" onclick="showDetail(${LANGUAGES.indexOf(l)})">
      <span class="icon">${l.icon}</span>
      <h3>${l.name}</h3>
      <div class="year">Est. ${l.year} &middot; ${l.creator}</div>
      <div class="desc">${l.purpose}</div>
      <div class="tags">
        <span class="tag" style="background:${getDifficultyColor(l.difficulty)}22;color:${getDifficultyColor(l.difficulty)}">${l.difficulty}</span>
        <span class="tag">${l.category}</span>
      </div>
    </div>
  `).join('');
}

function renderCategories() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = `<button class="cat-btn active" onclick="filterCategory('All', this)">All</button>` +
    CATEGORIES.map(c => `<button class="cat-btn" onclick="filterCategory('${c}', this)">${c}</button>`).join('');
}

let currentCategory = 'All';
function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = LANGUAGES;
  if (currentCategory !== 'All') filtered = filtered.filter(l => l.category === currentCategory);
  if (q) filtered = filtered.filter(l =>
    l.name.toLowerCase().includes(q) ||
    l.creator.toLowerCase().includes(q) ||
    l.category.toLowerCase().includes(q) ||
    l.purpose.toLowerCase().includes(q) ||
    (l.uses && l.uses.some(u => u.toLowerCase().includes(q)))
  );
  renderCards(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

function showDetail(idx) {
  const l = LANGUAGES[idx];
  const panel = document.getElementById('detailPanel');
  const grad = `linear-gradient(135deg, ${getDifficultyColor(l.difficulty)} 0%, ${getDifficultyColor(l.difficulty)}CC 100%)`;

  panel.innerHTML = `
    <div class="detail-header" style="background:${grad}">
      <button class="back-btn" onclick="closeDetail()">&larr;</button>
      <span class="big-icon">${l.icon}</span>
      <h1>${l.name}</h1>
      <div class="subtitle">Est. ${l.year} &middot; Created by ${l.creator}</div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h2>\uD83D\uDCA1 What is ${l.name}?</h2>
        <p>${l.purpose}</p>
      </div>

      <div class="detail-section">
        <h2>\uD83D\uDCA0 Why Was It Created?</h2>
        <p>${l.why}</p>
      </div>

      <div class="detail-section">
        <h2>\uD83D\uDCCB Quick Info</h2>
        <div class="info-grid">
          <div class="info-item"><div class="label">Creator</div><div class="value">${l.creator}</div></div>
          <div class="info-item"><div class="label">First Released</div><div class="value">${l.year}</div></div>
          <div class="info-item"><div class="label">Category</div><div class="value">${l.category}</div></div>
          <div class="info-item"><div class="label">Difficulty</div><div class="value">${l.difficulty}</div></div>
          <div class="info-item"><div class="label">Typing</div><div class="value">${l.typing}</div></div>
          <div class="info-item"><div class="label">Compilation</div><div class="value">${l.compilation}</div></div>
          <div class="info-item"><div class="label">Paradigm</div><div class="value">${l.paradigm}</div></div>
        </div>
      </div>

      <div class="detail-section">
        <h2>\uD83C\uDFAF What Is It Used For?</h2>
        <ul>${l.uses.map(u => `<li>${u}</li>`).join('')}</ul>
      </div>

      <div class="detail-section">
        <div class="highlight-box">
          <strong>\uD83D\uDD25 Real-World Examples:</strong><br>${l.realLife}
        </div>
      </div>

      <div class="detail-section">
        <h2>\u2B50 Key Features</h2>
        <ul>${l.keyFeatures.map(f => `<li>${f}</li>`).join('')}</ul>
      </div>

      <div class="detail-section">
        <h2>\uD83D\uDCA2 Hello World</h2>
        <div class="code-example">${escapeHtml(l.helloWorld)}</div>
      </div>

      <div class="detail-section">
        <div class="highlight-box">
          <strong>\uD83C\uDFC6 Why ${l.name} Matters:</strong><br>${l.famousFor}
        </div>
      </div>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// INIT
renderCategories();
renderCards(LANGUAGES);
document.getElementById('totalCount').textContent = LANGUAGES.length;
document.getElementById('catCount').textContent = CATEGORIES.length;
const years = LANGUAGES.map(l => l.year);
document.getElementById('yearRange').textContent = Math.min(...years) + '-' + Math.max(...years);
</script>
</body>
</html>
